<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Edlawit</title>
    <style>
        body { margin: 0; overflow: hidden; background: black; touch-action: none; }
        canvas { display: block; }
        audio { display: none; }
    </style>
</head>
<body>

    <canvas id="heart"></canvas>
    
    <audio id="myAudio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

<script>
    const canvas = document.getElementById('heart');
    const ctx = canvas.getContext('2d');
    const audio = document.getElementById('myAudio');
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let mouse = { x: null, y: null };
    let hasStarted = false; 
    const words = [];
    const text = "i love you";
    const name = "EDLAWIT";
    const totalWords = 30;

    function handleInteraction(e) {
        // የመጀመሪያው ንክኪ ሲኖር ዘፈኑ ይጀምራል
        if (!hasStarted) {
            audio.play();
            hasStarted = true;
        }
        
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        mouse.x = clientX;
        mouse.y = clientY;
    }

    window.addEventListener('touchstart', handleInteraction);
    window.addEventListener('touchmove', handleInteraction);
    window.addEventListener('mousedown', handleInteraction);
    
    window.addEventListener('touchend', () => { mouse.x = null; mouse.y = null; });
    window.addEventListener('mouseup', () => { mouse.x = null; mouse.y = null; });

    function getHeartPoint(t) {
        let x = 16 * Math.pow(Math.sin(t), 3);
        let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
        return { x: x * 11, y: y * 11 };
    }

    class Word {
        constructor(index) {
            this.t = (index / totalWords) * Math.PI * 2;
            const pos = getHeartPoint(this.t);
            this.x = canvas.width/2;
            this.y = canvas.height/2;
        }

        update() {
            this.t += 0.007; 
            const basePos = getHeartPoint(this.t);
            let targetX = canvas.width/2 + basePos.x;
            let targetY = canvas.height/2 + basePos.y;

            if (mouse.x !== null) {
                let dx = mouse.x - targetX;
                let dy = mouse.y - targetY;
                let distance = Math.sqrt(dx*dx + dy*dy);
                if (distance < 200) {
                    targetX += dx * 0.6; 
                    targetY += dy * 0.6;
                }
            }
            this.x += (targetX - this.x) * 0.1;
            this.y += (targetY - this.y) * 0.1;
        }

        draw() {
            ctx.fillStyle = "red";
            ctx.font = "bold 16px Arial";
            ctx.textAlign = "center";
            ctx.fillText(text, this.x, this.y);
        }
    }

    for (let i = 0; i < totalWords; i++) words.push(new Word(i));

    function animate() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "white";
        ctx.font = "bold 45px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(name, canvas.width/2, canvas.height/2);

        words.forEach(w => {
            w.update();
            w.draw();
        });
        requestAnimationFrame(animate);
    }
    animate();

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>
</body>
</html>
